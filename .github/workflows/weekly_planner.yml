name: Planejamento Semanal de Treino IA
on:
  schedule:
    - cron: '0 21 * * 0' # 18:00 BRT de Domingo
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv google-generativeai
      - name: Run Weekly Planner IA
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BASELINE_HRV: ${{ secrets.BASELINE_HRV }}
          BASELINE_HRV_MIN: ${{ secrets.BASELINE_HRV_MIN }}
          BASELINE_HRV_MAX: ${{ secrets.BASELINE_HRV_MAX }}
          GOAL_SLEEP: ${{ secrets.GOAL_SLEEP }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
        run: python -m health_tracker.weekly_planner
